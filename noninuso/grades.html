<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Teacher Grading System</title>
	<link rel="stylesheet" href="grades.css" />
</head>
<body>
	<header class="app-header">
		<div class="header-content">
			<div class="header-top">
				<h1>Teacher Grading System</h1>
				<div class="nav-actions">
					<button id="navHomeBtn" class="btn btn-secondary" onclick="window.location.href='index.html'">Classi</button>
					<button id="navTestsBtn" class="btn btn-secondary">Verifiche</button>
					<button id="navEvaluationBtn" class="btn btn-secondary">Valutazione</button>
					<!-- <button id="navConfigBtn" class="btn btn-secondary">Configurazione</button> -->
					<button id="resetBtn" class="btn btn-danger">Reset</button>
				</div>
			</div>
		</div>
	</header>

	<main class="container">
    <!-- Sezione classi rimossa: già presente in Classroom Manager -->

		<section id="classView" class="panel view">
			<div class="panel-header panel-header--actions">
				<h2>Classe</h2>
				<div class="panel-header-actions">
					<button id="backToHomeBtn" class="btn btn-secondary">Torna alle classi</button>
					<button id="deleteClassBtn" class="icon-btn" aria-label="Elimina classe">×</button>
				</div>
			</div>
			<div class="panel-actions">
				<div class="field">
					<label for="classSelect">Seleziona classe</label>
					<select id="classSelect"></select>
				</div>
				<div class="field">
					<label for="classRenameInput">Rinomina classe</label>
					<input id="classRenameInput" type="text" />
				</div>
				<button id="renameClassBtn" class="btn btn-secondary">Aggiorna nome</button>
			</div>
			<div class="panel-actions">
				<button id="addStudentBtn" class="btn btn-primary">Aggiungi studente</button>
			</div>
			<div class="bulk-students">
				<div class="field">
					<label for="bulkStudentsInput">Aggiungi studenti (nomi completi separati da virgole o righe)</label>
					<textarea id="bulkStudentsInput" rows="3" placeholder="Reina Allmeta,&#10;Barbara Atanasova,&#10;Aida Bance,"></textarea>
				</div>
				<button id="addBulkStudentsBtn" class="btn btn-secondary">Aggiungi studenti</button>
			</div>
			<div class="table-wrapper">
				<table id="classStudentsTable" class="grade-table"></table>
			</div>
		</section>

		<section id="testsView" class="panel view">
			<div class="panel-header">
				<h2>Verifiche</h2>
				<button id="addTestBtn" class="btn btn-primary">+ Nuova verifica</button>
			</div>
			<div id="testsList" class="card-grid"></div>
		</section>

		<!-- Dialog per nuova verifica -->
		<dialog id="newTestDialog">
			<form method="dialog" id="newTestForm">
				<h3>Nuova verifica</h3>
				<div class="field">
					<label for="newTestNameInput">Nome verifica</label>
					<input id="newTestNameInput" name="newTestNameInput" type="text" placeholder="Nome della verifica" required />
				</div>
				<div class="field">
					<label for="newTestSubjectInput">Materia</label>
					<input id="newTestSubjectInput" name="newTestSubjectInput" type="text" placeholder="Materia" required />
				</div>
				<div class="field">
					<label for="newTestClassesSelect">Classi</label>
					<select id="newTestClassesSelect" name="newTestClassesSelect" multiple required></select>
					<small>Seleziona una o più classi</small>
				</div>
				<menu>
					<button id="cancelNewTestBtn" type="reset">Annulla</button>
					<button id="confirmNewTestBtn" type="submit" class="btn btn-primary">Crea</button>
				</menu>
			</form>
		</dialog>

		<section id="testView" class="panel view">
			<div class="panel-header">
				<h2>Valutazione</h2>
				<div class="panel-actions">
					<div class="field">
						<label for="testClassSelect">Classe</label>
						<select id="testClassSelect"></select>
					</div>
					<div class="field">
						<label for="testSelect">Verifica</label>
						<select id="testSelect"></select>
					</div>
					<div class="field">
						<label for="testVersionSelect">Versione</label>
						<select id="testVersionSelect"></select>
					</div>
					<button id="exportBtn" class="btn btn-secondary">Export CSV</button>
				</div>
			</div>
			<div class="table-wrapper">
				<table id="gradeTable" class="grade-table"></table>
			</div>
			<div id="warningArea" class="warning-area"></div>
		</section>

	</main>

	<footer class="app-footer">
		<span>Auto-saved locally. Reload safe.</span>
	</footer>

	<template id="sectionTemplate">
		<div class="section-card">
			<div class="section-header">
				<div class="field">
					<label>Section Name</label>
					<input type="text" class="section-name" placeholder="e.g., Grammar" />
				</div>
				<div class="section-actions">
					<button class="btn btn-secondary add-subsection">Add Subsection</button>
					<button class="btn btn-danger remove-section">Remove</button>
				</div>
			</div>
			<div class="subsections"></div>
		</div>
	</template>

	<template id="subsectionTemplate">
		<div class="subsection-row">
			<div class="field">
				<label>Subsection Name</label>
				<input type="text" class="subsection-name" placeholder="e.g., Exercise 1" />
			</div>
			<div class="field small">
				<label>Weight</label>
				<input type="number" class="subsection-weight" min="0" step="0.1" />
			</div>
			<div class="field small">
				<label>Max Score</label>
				<input type="number" class="subsection-max" min="0" step="0.1" />
			</div>
			<button class="btn btn-danger remove-subsection">Remove</button>
		</div>
	</template>

	<script type="module">

	// Popola select classi nel dialog nuova verifica
	function populateNewTestClassesSelect(classes) {
		const select = document.getElementById('newTestClassesSelect');
		if (!select) return;
		select.innerHTML = '';
		(classes || []).forEach(cls => {
			const opt = document.createElement('option');
			opt.value = cls.id;
			opt.textContent = cls.name;
			select.appendChild(opt);
		});
	}
		import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
		import { getAuth, onAuthStateChanged, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
		import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

		// Firebase config (uguale a Classroom Manager)
		const firebaseConfig = {
			apiKey: "AIzaSyA6O12KFRkZ4gGBi2LEGKZni33c3a2NBcU",
			authDomain: "classroomanager.firebaseapp.com",
			databaseURL: "https://classroomanager-default-rtdb.europe-west1.firebasedatabase.app",
			projectId: "classroomanager",
			storageBucket: "classroomanager.firebasestorage.app",
			messagingSenderId: "995055049853",
			appId: "1:995055049853:web:5b3674ae12f7c0b504e514"
		};

		const app = initializeApp(firebaseConfig);
		const auth = getAuth(app);
		const db = getDatabase(app);
		const provider = new GoogleAuthProvider();

		let firebaseData = { classes: [], tests: [] };
		let currentUser = null;

		function showLogin() {
			// Mostra login solo se serve, senza usare classList
			const dialog = document.createElement('div');
			dialog.innerHTML = '<button id="gradesLoginBtn" class="btn btn-primary">Accedi con Google per vedere le classi</button>';
			document.body.appendChild(dialog);
			document.getElementById('gradesLoginBtn').onclick = async () => {
				try { await signInWithPopup(auth, provider); } catch(e) { alert('Login fallito'); }
			};
		}

		function renderClassListFirebase(classes) {
			populateNewTestClassesSelect(classes);
		}

		function renderTestSelects(classes, tests) {
			// Popola select classi
			const classSel = document.getElementById('testClassSelect');
				// Gestione dialog nuova verifica
				const addTestBtn = document.getElementById('addTestBtn');
				const newTestDialog = document.getElementById('newTestDialog');
				const newTestForm = document.getElementById('newTestForm');

				if (addTestBtn && newTestDialog) {
					addTestBtn.onclick = () => {
						newTestDialog.showModal();
					};
				}

				if (newTestForm) {
					newTestForm.onsubmit = function(e) {
						e.preventDefault();
						const name = document.getElementById('newTestNameInput').value.trim();
						const subject = document.getElementById('newTestSubjectInput').value.trim();
						const classesSelect = document.getElementById('newTestClassesSelect');
						const selectedClassIds = Array.from(classesSelect.selectedOptions).map(opt => opt.value);
						if (!name || !subject || selectedClassIds.length === 0) {
							alert('Compila tutti i campi e seleziona almeno una classe');
							return;
						}
						const newTest = {
							id: 'test-' + Date.now(),
							title: name,
							subject: subject,
							classIds: selectedClassIds,
							sections: []
						};
						firebaseData.tests.push(newTest);
						if (currentUser) {
							const userRef = ref(db, 'users/' + currentUser.uid);
							set(userRef, { classes: firebaseData.classes, tests: firebaseData.tests });
						}
						newTestDialog.close();
						updateGradeUI();
					};
				}
			classSel.innerHTML = '';
			(classes || []).forEach((cls, idx) => {
				const opt = document.createElement('option');
				opt.value = idx;
				opt.textContent = cls.name;
				classSel.appendChild(opt);
			});
			// Popola select test
			const testSel = document.getElementById('testSelect');
			testSel.innerHTML = '';
			(tests || []).forEach((test, idx) => {
				const opt = document.createElement('option');
				opt.value = idx;
				opt.textContent = test.title || 'Verifica';
				testSel.appendChild(opt);
			});
		}

		function renderGradeTable(classes, tests, classIdx, testIdx) {
			const table = document.getElementById('gradeTable');
			if (!table) return;
			if (!classes[classIdx] || !tests[testIdx]) {
				table.innerHTML = '<tr><td>Seleziona una classe e una verifica</td></tr>';
				return;
			}
			const cls = classes[classIdx];
			const test = tests[testIdx];
			   // Header
			   let html = '<thead><tr><th>Studente</th>';
			   (test.sections || []).forEach(section => {
				   if (section.subsections && section.subsections.length > 0) {
					   section.subsections.forEach(sub => {
						   html += `<th>${section.name}<br><small>${sub.name}</small></th>`;
					   });
				   } else {
					   html += `<th>${section.name}</th>`;
				   }
			   });
			   html += '<th>FINAL</th></tr></thead><tbody>';
			   // Rows
			   (cls.students || []).forEach((stu, stuIdx) => {
				   html += `<tr><td>${stu.displayName || stu.fullName || stu.name || ''}</td>`;
				   // Calcolo finale
				   let weightedSum = 0, weightedMaxSum = 0;
				   (test.sections || []).forEach(section => {
					   if (section.subsections && section.subsections.length > 0) {
						   let sectionWeightSum = 0, sectionMaxSum = 0, sectionScoreSum = 0;
						   section.subsections.forEach(sub => {
							   const val = (stu.scores && stu.scores[test.id] && stu.scores[test.id][section.id] && stu.scores[test.id][section.id][sub.id]) || '';
							   html += `<td><input type='number' min='0' max='${sub.max || ''}' step='0.1' value='${val}' data-stu='${stuIdx}' data-sec='${section.id}' data-sub='${sub.id}' data-test='${test.id}' style='width:60px'></td>`;
							   const v = parseFloat(val);
							   const w = parseFloat(sub.weight) || 1;
							   const m = parseFloat(sub.max) || 10;
							   if (!isNaN(v)) {
								   sectionScoreSum += (v / m) * w;
							   }
							   sectionWeightSum += w;
							   sectionMaxSum += w;
						   });
						   // Media pesata della section
						   if (sectionWeightSum > 0) {
							   const sectionScore = (sectionScoreSum / sectionWeightSum) * (parseFloat(section.max) || 10);
							   weightedSum += sectionScore * (parseFloat(section.weight) || 1);
							   weightedMaxSum += (parseFloat(section.max) || 10) * (parseFloat(section.weight) || 1);
						   }
					   } else {
						   const val = (stu.scores && stu.scores[test.id] && stu.scores[test.id][section.id]) || '';
						   html += `<td><input type='number' min='0' max='${section.max || ''}' step='0.1' value='${val}' data-stu='${stuIdx}' data-sec='${section.id}' data-test='${test.id}' style='width:60px'></td>`;
						   const v = parseFloat(val);
						   const m = parseFloat(section.max) || 10;
						   if (!isNaN(v)) {
							   weightedSum += v * (parseFloat(section.weight) || 1);
							   weightedMaxSum += m * (parseFloat(section.weight) || 1);
						   }
					   }
				   });
				   let finalGrade = '';
				   if (weightedMaxSum > 0) {
					   finalGrade = ((weightedSum * 10) / weightedMaxSum).toFixed(2);
				   }
				   html += `<td>${finalGrade}</td></tr>`;
			   });
			   html += '</tbody>';
			   table.innerHTML = html;

			// Eventi input
			table.querySelectorAll('input[type=number]').forEach(input => {
				input.addEventListener('change', function() {
					const stuIdx = this.dataset.stu;
					const secId = this.dataset.sec;
					const subId = this.dataset.sub;
					const testId = this.dataset.test;
					const val = this.value;
					let stu = classes[classIdx].students[stuIdx];
					if (!stu.scores) stu.scores = {};
					if (!stu.scores[testId]) stu.scores[testId] = {};
					if (subId) {
						if (!stu.scores[testId][secId]) stu.scores[testId][secId] = {};
						stu.scores[testId][secId][subId] = val;
					} else {
						stu.scores[testId][secId] = val;
					}
					// Salva su Firebase
					if (currentUser) {
						const userRef = ref(db, 'users/' + currentUser.uid);
						set(userRef, { classes: classes, tests: tests });
					}
				});
			});
		}

		let selectedClassIdx = 0;
		let selectedTestIdx = 0;

		function updateGradeUI() {
			renderTestSelects(firebaseData.classes, firebaseData.tests);
			const classSel = document.getElementById('testClassSelect');
			const testSel = document.getElementById('testSelect');
			// Reset indici se non validi
			if (!firebaseData.classes[selectedClassIdx]) selectedClassIdx = 0;
			if (!firebaseData.tests[selectedTestIdx]) selectedTestIdx = 0;
			if (classSel) classSel.value = selectedClassIdx;
			if (testSel) testSel.value = selectedTestIdx;
			if (firebaseData.classes.length && firebaseData.tests.length) {
				renderGradeTable(firebaseData.classes, firebaseData.tests, selectedClassIdx, selectedTestIdx);
			} else {
				document.getElementById('gradeTable').innerHTML = '<tr><td>Seleziona una classe e una verifica</td></tr>';
			}
			if (classSel) {
				classSel.onchange = function() {
					selectedClassIdx = parseInt(this.value);
					if (testSel) testSel.value = selectedTestIdx;
					if (firebaseData.classes.length && firebaseData.tests.length) {
						renderGradeTable(firebaseData.classes, firebaseData.tests, selectedClassIdx, selectedTestIdx);
					}
				};
			}
			if (testSel) {
				testSel.onchange = function() {
					selectedTestIdx = parseInt(this.value);
					if (classSel) classSel.value = selectedClassIdx;
					if (firebaseData.classes.length && firebaseData.tests.length) {
						renderGradeTable(firebaseData.classes, firebaseData.tests, selectedClassIdx, selectedTestIdx);
					}
				};
			}
		}

		onAuthStateChanged(auth, (user) => {
			if (user) {
				currentUser = user;
				const userRef = ref(db, 'users/' + user.uid);
				onValue(userRef, (snapshot) => {
					const data = snapshot.val();
					firebaseData = { classes: data?.classes || [], tests: data?.tests || [] };
					renderClassListFirebase(firebaseData.classes);
					updateGradeUI();
				});
			} else {
				showLogin();
			}
		});
	</script>
	<script src="app.js"></script>
</body>
</html>
